<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
        <meta name="description" content="EaglercraftX 1.14.4 WASM-GC test directory HTML page" />
        <meta name="keywords" content="eaglercraft, eaglercraftx, minecraft, 1.14, 1.14.4" />
        <title>EaglercraftX 1.14.4 WASM-GC</title>
        <meta property="og:locale" content="en-US" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="EaglercraftX 1.14.4 WASM-GC" />
        <meta property="og:description" content="test directory HTML page" />
        <link type="image/png" rel="shortcut icon" href="favicon.png" />
        <style>
            #progress-container {
                position: absolute;
                bottom: 20%;
                left: 50%;
                transform: translateX(-50%);
                width: 300px;
                background-color: rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                padding: 4px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                display: none;
                z-index: 9999;
            }
            #progress-bar {
                width: 0%;
                height: 14px;
                background-color: #238636;
                border-radius: 4px;
                transition: width 0.1s linear;
            }
            #progress-text {
                color: white;
                font-family: monospace;
                font-size: 12px;
                text-align: center;
                margin-top: 6px;
            }
        </style>
        <script type="text/javascript">
            "use strict";
            window.addEventListener("load", async function() {
                if(window.location.href.indexOf("file:") === 0) {
                    alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
                }else if(typeof WebAssembly.Suspending === "undefined") {
                    alert("JSPI is not enabled, please enable it in chrome://flags");
                }else {
                    const splash = document.createElement("div");
                    splash.style.width = "100%";
                    splash.style.height = "100%";
                    splash.style.imageRendering = "pixelated";
                    splash.style.background = "center / contain no-repeat url(splash.png), 0px 0px / 1000000% 1000000% no-repeat url(splash.png) white";
                    document.body.appendChild(splash);

                    // Progress bar elements container
                    const progContainer = document.createElement("div");
                    progContainer.id = "progress-container";
                    progContainer.style.display = "block";
                    progContainer.innerHTML = '<div id="progress-bar"></div><div id="progress-text">Downloading assets.epk (0%)</div>';
                    document.body.appendChild(progContainer);

                    const progressBar = document.getElementById("progress-bar");
                    const progressText = document.getElementById("progress-text");

                    console.log("Downloading assets.epk...");
                    var assetsEPK;
                    try {
                        const response = await fetch("https://raw.githubusercontent.com/eymenwsmc/offline/refs/heads/main/assets.epk");
                        if (!response.ok) throw new Error("Network response was not ok");

                        const contentLength = response.headers.get("content-length");
                        const total = contentLength ? parseInt(contentLength, 10) : 0;
                        let loaded = 0;

                        const reader = response.body.getReader();
                        const chunks = [];

                        while(true) {
                            const {done, value} = await reader.read();
                            if (done) break;
                            chunks.push(value);
                            loaded += value.length;

                            if (total > 0) {
                                const percent = Math.round((loaded / total) * 100);
                                progressBar.style.width = percent + "%";
                                progressText.innerText = "Downloading assets.epk (" + percent + "%) - " + (loaded / (1024*1024)).toFixed(1) + " MB";
                            } else {
                                progressText.innerText = "Downloading assets.epk... " + (loaded / (1024*1024)).toFixed(1) + " MB";
                            }
                        }

                        let totalLength = chunks.reduce((acc, val) => acc + val.length, 0);
                        let fullArr = new Uint8Array(totalLength);
                        let offset = 0;
                        for(let chunk of chunks) {
                            fullArr.set(chunk, offset);
                            offset += chunk.length;
                        }
                        assetsEPK = fullArr;
                        progContainer.style.display = "none";
                    }catch(ex) {
                        alert("Could not download assets.epk!");
                        console.error("Could not download assets.epk!");
                        console.error(ex);
                        return;
                    }
                    console.log("Downloaded " + assetsEPK.length + " byte file");

                    const relayId = Math.floor(Math.random() * 3);
                    const eaglercraftXOpts = {
                        demoMode: false,
                        localesURI: "lang/",
                        worldsDB: "worlds",
                        servers: [
                            { addr: "ws://localhost:8081/", name: "Local test server" }
                        ],
                        relays: [
                            { addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId === 0 },
                            { addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId === 1 },
                            { addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId === 2 }
                        ]
                    };

                    window.__eaglercraftXLoaderContext = {
                        getEaglercraftXOpts: function() {
                            return eaglercraftXOpts;
                        },
                        getEagRuntimeJSURL: function() {
                            return "eagruntime.js";
                        },
                        getClassesWASMURL: function() {
                            return "classes.wasm";
                        },
                        getClassesDeobfWASMURL: function() {
                            return "classes.wasm-deobfuscator.wasm";
                        },
                        getClassesTEADBGURL: function() {
                            return "classes.wasm.teadbg";
                        },
                        getEPKFiles: function() {
                            return [{
                                name: "assets.epk",
                                path: "",
                                data: assetsEPK
                            }];
                        },
                        getRootElement: function() {
                            return document.body;
                        },
                        getMainArgs: function() {
                            return [];
                        },
                        getImageURL: function(idx) {
                            switch(idx) {
                            case 0:
                                return "splash.png";
                            case 1:
                                return "pressAnyKey.png";
                            case 2:
                                return "crashLogo.png";
                            case 3:
                                return "favicon.png";
                            default:
                                return null;
                            }
                        },
                        runMain: function(fn) {
                            setTimeout(fn, 10);
                        }
                    };

                    var q = window.location.search;
                    if((typeof q === "string") && q[0] === "?" && (typeof URLSearchParams !== "undefined")) {
                        q = new URLSearchParams(q);
                        var s = q.get("server");
                        if(s) eaglercraftXOpts.joinServer = s;
                    }

                    const scriptElement = document.createElement("script");
                    scriptElement.type = "text/javascript";
                    scriptElement.src = "eagruntime.js";
                    document.head.appendChild(scriptElement);
                }
            });
        </script>
    </head>
    <body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame"></body>
</html>
