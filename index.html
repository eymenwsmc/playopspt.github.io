<!DOCTYPE html>
<html lang="tr">
<head>
  <title>Eaglercraft 1.7.10 & 1.14</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --text-bright: #f0f6fc;
      --primary: #238636;
      --primary-hover: #2ea043;
      --secondary: #21262d;
      --secondary-hover: #30363d;
      --border-color: #30363d;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      color: var(--text-bright);
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #8b949e;
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 40px;
    }

    .play-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 50px;
    }

    button {
      font-family: inherit;
      border: 1px solid var(--border-color);
      color: var(--text-bright);
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: var(--secondary);
    }

    button:hover {
      background-color: var(--secondary-hover);
      border-color: #8b949e;
    }

    button.btn-new {
      background-color: var(--primary);
      border-color: rgba(240,246,252,0.1);
    }

    button.btn-new:hover {
      background-color: var(--primary-hover);
    }

    .downloads-box {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 25px;
      text-align: left;
    }

    .downloads-box h2 {
      color: var(--text-bright);
      margin-top: 0;
      font-size: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .download-section {
      margin-top: 20px;
    }

    .download-section h3 {
      font-size: 14px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    a.download {
      display: block;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: #58a6ff;
      text-decoration: none;
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s, border-color 0.2s;
    }

    a.download:hover {
      background-color: var(--secondary-hover);
      border-color: #58a6ff;
    }

    footer {
      margin-top: 60px;
      font-size: 12px;
      color: #484f58;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Eaglercraft</h1>
    <p class="subtitle">Play Eaglercraft 1.7.10 and 1.14</p>
    
    <div class="play-buttons">
      <button onclick="window.location.href='1.7.10.html'">Play 1.7.10</button>
      <button class="btn-new" onclick="window.location.href='./javascript/index.html'">Play 1.14</button>
    </div>

    <div class="downloads-box">
      <h2>Offline Downloads</h2>
      <p style="color: #8b949e; font-size: 14px; margin-top: -5px;">Right-click and save or download to play offline anytime.</p>
      
      <div class="download-section">
        <h3>1.7.10 Versions</h3>
        <div class="links-grid">
          <a href="1.7.10.html" download class="download">Download 1.7.10 (en_US)</a>
          <a href="classic.html" download class="download">Download 1.7.10 (International)</a>
        </div>
      </div>
      
      <div class="download-section">
        <h3>1.14 Versions</h3>
        <div class="links-grid">
          <a href="https://raw.githubusercontent.com/eymenwsmc/offline/refs/heads/main/Eaglercraft_1.14.4_WASM-GC_Offline_Download.html" download class="download">Download 1.14 WASM (compressed sounds) 33MB</a>
      </div>
    </div>

    <footer>
      made by eymenwsmc
    </footer>
  </div>

</body>
</html>
